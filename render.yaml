services:
  # Vite React Frontend Static Site
  - type: static
    name: farmdiaries-frontend
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set to the URL of the deployed backend (e.g., https://farmdiaries-backend.onrender.com)
