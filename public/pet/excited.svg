<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%">
  <style>
    @keyframes jump {
      0%, 100% { transform: translateY(0px) scaleY(1) scaleX(1); }
      40% { transform: translateY(-12px) scaleY(1.05) scaleX(0.95); }
      50% { transform: translateY(-12px) scaleY(1) scaleX(1); }
      85% { transform: translateY(0px) scaleY(0.95) scaleX(1.05); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-6deg); }
      75% { transform: rotate(6deg); }
    }
    @keyframes shadow-scale {
      0%, 100% { transform: scaleX(1) scaleY(1); opacity: 0.6; }
      40%, 50% { transform: scaleX(0.7) scaleY(0.7); opacity: 0.25; }
    }
    @keyframes sparkle-rotate {
      0% { transform: rotate(0deg) scale(0.8); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(0.8); }
    }
    
    .character {
      animation: jump 1s ease-in-out infinite;
      transform-origin: 50% 95px;
    }
    .sprout {
      animation: wiggle 2s ease-in-out infinite;
      transform-origin: 50% 12px;
    }
    .shadow-el {
      animation: shadow-scale 1s ease-in-out infinite;
      transform-origin: 50% 112px;
    }
    .sparkle-left {
      animation: sparkle-rotate 2s linear infinite;
      transform-origin: 18px 45px;
    }
    .sparkle-right {
      animation: sparkle-rotate 2.5s linear infinite;
      transform-origin: 82px 49px;
    }
  </style>
  
  <!-- Soft Shadow (scales down as character jumps) -->
  <ellipse class="shadow-el" cx="50" cy="112" rx="24" ry="4.5" fill="#CBD5E1"/>
  
  <!-- Character Group -->
  <g class="character">
    <!-- Base Stem -->
    <path d="M 50 96 Q 50 108, 47 110" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Stubby Legs dangling while jumping -->
    <path d="M 41 94 L 37 106 Q 34 107, 34 109 L 40 109 L 43 94" fill="#6C3A00"/>
    <path d="M 59 94 L 63 106 Q 66 107, 66 109 L 60 109 L 57 94" fill="#6C3A00"/>

    <!-- Rice Grain Body -->
    <path d="M50 12 C65 35, 72 65, 68 90 C66 96, 34 96, 32 90 C28 65, 35 35, 50 12 Z" fill="#FFC000" stroke="#6C3A00" stroke-width="3.5" stroke-linejoin="round"/>
    
    <!-- Highlight -->
    <path d="M50 15.5 C38 36, 34 65, 36 88 C38 89.5, 42 89.5, 43.5 88 C40 65, 43 36, 50 15.5 Z" fill="#FFE066" opacity="0.7"/>

    <!-- Ridges -->
    <path d="M43 18 C37 42, 37 68, 41 90" fill="none" stroke="#E0A000" stroke-width="2" opacity="0.6"/>
    <path d="M57 18 C63 42, 63 68, 59 90" fill="none" stroke="#E0A000" stroke-width="2" opacity="0.6"/>

    <!-- Wiggling Sprout -->
    <g class="sprout">
      <path d="M50 12 Q57 3, 64 7 Q56 11, 50 12 Z" fill="#2ECC71" stroke="#27AE60" stroke-width="1.5"/>
      <path d="M50 12 Q43 5, 37 9 Q45 12, 50 12 Z" fill="#2ECC71" stroke="#27AE60" stroke-width="1.5"/>
    </g>

    <!-- Raised Arms (Excited wave) -->
    <path d="M 31 70 Q 20 58, 22 52 Q 24 48, 28 54" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 69 70 Q 80 58, 78 52 Q 76 48, 72 54" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Closed Eyes (^ ^) -->
    <path d="M35 62 Q40 56, 45 62" fill="none" stroke="#6C3A00" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M55 62 Q60 56, 65 62" fill="none" stroke="#6C3A00" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Blush Cheeks -->
    <circle cx="33" cy="69" r="5" fill="#FF8A8A" opacity="0.85"/>
    <circle cx="67" cy="69" r="5" fill="#FF8A8A" opacity="0.85"/>

    <!-- Big Open Laughing Mouth -->
    <path d="M43 68 C43 78, 57 78, 57 68 Z" fill="#E11D48" stroke="#6C3A00" stroke-width="3.5" stroke-linejoin="round"/>
  </g>

  <!-- Sparkles -->
  <g class="sparkle-left">
    <path d="M18 40 L20 44 L24 45 L20 46 L18 50 L16 46 L12 45 L16 44 Z" fill="#FFC000"/>
  </g>
  <g class="sparkle-right">
    <path d="M82 44 L84 48 L88 49 L84 50 L82 54 L80 50 L76 49 L80 48 Z" fill="#FFC000"/>
  </g>
</svg>
