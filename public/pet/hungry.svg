<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%">
  <style>
    @keyframes breathe-hungry {
      0%, 100% { transform: translateY(0px) scaleY(1); }
      50% { transform: translateY(2px) scaleY(0.97) scaleX(1.03); }
    }
    @keyframes growl {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }
    @keyframes eye-plead {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.95); }
    }
    @keyframes shadow-scale {
      0%, 100% { transform: scaleX(1); opacity: 0.6; }
      50% { transform: scaleX(1.05); opacity: 0.7; }
    }
    
    .character {
      animation: breathe-hungry 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: 50% 95px;
    }
    .shadow-el {
      animation: shadow-scale 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: 50% 112px;
    }
    .growl-line {
      animation: growl 1.2s ease-in-out infinite;
      transform-origin: 50% 80px;
    }
    .eyes {
      animation: eye-plead 2.5s ease-in-out infinite;
      transform-origin: 50% 62px;
    }
  </style>
  
  <!-- Soft Shadow -->
  <ellipse class="shadow-el" cx="50" cy="112" rx="24" ry="4.5" fill="#CBD5E1"/>
  
  <!-- Character Group -->
  <g class="character">
    <!-- Base Stem -->
    <path d="M 50 96 Q 50 108, 47 110" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Stubby Legs -->
    <path d="M 41 94 L 39 105 Q 36 105, 35 107 L 42 107 L 43 94" fill="#6C3A00"/>
    <path d="M 59 94 L 61 105 Q 64 105, 65 107 L 58 107 L 56 94" fill="#6C3A00"/>

    <!-- Rice Grain Body -->
    <path d="M50 12 C65 35, 72 65, 68 90 C66 96, 34 96, 32 90 C28 65, 35 35, 50 12 Z" fill="#FFC000" stroke="#6C3A00" stroke-width="3.5" stroke-linejoin="round"/>
    
    <!-- Grain Highlight -->
    <path d="M50 15.5 C38 36, 34 65, 36 88 C38 89.5, 42 89.5, 43.5 88 C40 65, 43 36, 50 15.5 Z" fill="#FFE066" opacity="0.7"/>

    <!-- Ridges -->
    <path d="M43 18 C37 42, 37 68, 41 90" fill="none" stroke="#E0A000" stroke-width="2" opacity="0.6"/>
    <path d="M57 18 C63 42, 63 68, 59 90" fill="none" stroke="#E0A000" stroke-width="2" opacity="0.6"/>

    <!-- Sprout (drooping slightly) -->
    <g class="sprout">
      <path d="M50 12 Q54 6, 52 1 Q49 7, 50 12 Z" fill="#2ECC71" stroke="#27AE60" stroke-width="1.5"/>
      <path d="M50 12 Q44 7, 39 4 Q46 10, 50 12 Z" fill="#2ECC71" stroke="#27AE60" stroke-width="1.5"/>
    </g>

    <!-- Hands clutching belly -->
    <path d="M 32 70 Q 38 78, 42 77" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 68 70 Q 62 78, 58 77" fill="none" stroke="#6C3A00" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Large Puppy Pleading Eyes -->
    <g class="eyes">
      <circle cx="41.5" cy="62" r="5" fill="#6C3A00"/>
      <circle cx="58.5" cy="62" r="5" fill="#6C3A00"/>
      <!-- Sparkly Highlights -->
      <circle cx="40" cy="60" r="1.5" fill="#FFFFFF"/>
      <circle cx="57" cy="60" r="1.5" fill="#FFFFFF"/>
      <circle cx="43" cy="63" r="0.8" fill="#FFFFFF"/>
      <circle cx="60" cy="63" r="0.8" fill="#FFFFFF"/>
    </g>

    <!-- Sad mouth -->
    <path d="M46 71 Q50 67, 54 71" fill="none" stroke="#6C3A00" stroke-width="3" stroke-linecap="round"/>

    <!-- Stomach Growl wave lines -->
    <g class="growl-line">
      <path d="M 24 78 Q 21 80, 24 82 T 24 86" fill="none" stroke="#E0A000" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M 76 78 Q 79 80, 76 82 T 76 86" fill="none" stroke="#E0A000" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>
</svg>
