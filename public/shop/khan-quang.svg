<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100%" height="100%">
  <!-- Khăn Quàng Đỏ (Red Scarf) -->
  <g transform="translate(50, 30)">
    <!-- Scarf wrap around neck -->
    <path d="M-22 -10 C-10 -5, 10 -5, 22 -10 C25 5, 15 15, 0 15 C-15 15, -25 5, -22 -10 Z" fill="#E63946" stroke="#C1121F" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Scarf tails -->
    <path d="M-5 10 C-10 25, -20 35, -15 38 C-10 40, -5 30, 2 12 Z" fill="#E63946" stroke="#C1121F" stroke-width="2" stroke-linejoin="round" />
    <path d="M5 10 C15 20, 18 30, 12 32 C5 34, 0 25, -2 12 Z" fill="#C1121F" stroke="#780000" stroke-width="1.5" stroke-linejoin="round" />
    
    <!-- Knot -->
    <ellipse cx="0" cy="10" rx="6" ry="5" fill="#E63946" stroke="#C1121F" stroke-width="2" />
  </g>
</svg>
