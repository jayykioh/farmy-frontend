<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100%" height="100%">
  <!-- Vương Miện (Crown) -->
  <g transform="translate(50, 40)">
    <!-- Base -->
    <path d="M-20 10 C-20 15, 20 15, 20 10 Z" fill="#F4A261" stroke="#E76F51" stroke-width="2" stroke-linejoin="round" />
    <path d="M-25 0 C-25 10, 25 10, 25 0 L-25 0 Z" fill="#E9C46A" />
    
    <!-- Peaks -->
    <path d="M-25 0 L-30 -25 L-10 -5 L0 -30 L10 -5 L30 -25 L25 0 Z" fill="#F4A261" stroke="#E76F51" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Jewels -->
    <circle cx="0" cy="-30" r="3" fill="#E63946" />
    <circle cx="-30" cy="-25" r="3" fill="#2A9D8F" />
    <circle cx="30" cy="-25" r="3" fill="#2A9D8F" />
    <circle cx="0" cy="-5" r="2.5" fill="#2A9D8F" />
    <circle cx="-15" cy="-2" r="2" fill="#E63946" />
    <circle cx="15" cy="-2" r="2" fill="#E63946" />
  </g>
</svg>
