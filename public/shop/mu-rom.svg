<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100%" height="100%">
  <!-- Mũ Rơm (Straw Hat) -->
  <g transform="translate(50, 30)">
    <!-- Back brim -->
    <ellipse cx="0" cy="15" rx="45" ry="12" fill="#D4A373" />
    
    <!-- Crown -->
    <path d="M-25 10 C-25 -20, 25 -20, 25 10 Z" fill="#FFE8A1" stroke="#E6C27A" stroke-width="2" />
    
    <!-- Red Ribbon -->
    <path d="M-25 5 C-25 15, 25 15, 25 5 L25 10 C25 20, -25 20, -25 10 Z" fill="#E63946" />
    
    <!-- Front brim -->
    <path d="M-45 15 C-45 28, 45 28, 45 15 C45 15, 25 18, 0 18 C-25 18, -45 15, -45 15 Z" fill="#FFE8A1" stroke="#E6C27A" stroke-width="2" />
    
    <!-- Straw texture lines -->
    <path d="M-15 -10 L-15 0 M0 -12 L0 0 M15 -10 L15 0" stroke="#E6C27A" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
