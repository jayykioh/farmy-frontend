<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100%" height="100%">
  <!-- Kính Cận (Nerd Glasses) -->
  <g transform="translate(50, 20)">
    <!-- Bridge -->
    <path d="M-10 0 C-5 -5, 5 -5, 10 0" fill="none" stroke="#111" stroke-width="2" />
    
    <!-- Left Lens -->
    <circle cx="-22" cy="0" r="14" fill="#E0F7FA" stroke="#111" stroke-width="2" opacity="0.8" />
    <!-- Tape on bridge (Nerd style) -->
    <rect x="-3" y="-5" width="6" height="10" fill="#FFF" opacity="0.9" rx="1" transform="rotate(15)" />
    
    <!-- Right Lens -->
    <circle cx="22" cy="0" r="14" fill="#E0F7FA" stroke="#111" stroke-width="2" opacity="0.8" />
    
    <!-- Glare -->
    <path d="M-30 -8 L-18 4 M28 -8 L16 4" stroke="#FFF" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    
    <!-- Temples -->
    <path d="M-36 0 L-45 -2 M36 0 L45 -2" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
