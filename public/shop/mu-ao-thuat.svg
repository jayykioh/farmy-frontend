<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100%" height="100%">
  <!-- Mũ Ảo Thuật (Magic Top Hat) -->
  <g transform="translate(50, 40)">
    <!-- Back brim -->
    <ellipse cx="0" cy="25" rx="35" ry="8" fill="#111" />
    
    <!-- Crown -->
    <path d="M-22 20 L-25 -25 C-25 -30, 25 -30, 25 -25 L22 20 Z" fill="#222" />
    
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-25" rx="25" ry="6" fill="#333" />
    
    <!-- Red Ribbon -->
    <path d="M-23 10 L-22 20 C-22 25, 22 25, 22 20 L23 10 C23 15, -23 15, -23 10 Z" fill="#E63946" />
    
    <!-- Front brim -->
    <path d="M-35 25 C-35 35, 35 35, 35 25 C35 25, 22 28, 0 28 C-22 28, -35 25, -35 25 Z" fill="#222" />
    
    <!-- Magic Sparkles -->
    <path d="M-30 -10 L-25 -15 L-20 -10 L-25 -5 Z" fill="#FFD166" />
    <path d="M30 0 L33 -3 L36 0 L33 3 Z" fill="#FFD166" />
  </g>
</svg>
