<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100%" height="100%">
  <!-- Nón Lá (Conical Hat) -->
  <g transform="translate(50, 30)">
    <!-- Back inner shadow -->
    <path d="M-45 10 C-45 18, 45 18, 45 10 C45 0, -45 0, -45 10 Z" fill="#D4A373" />
    
    <!-- Main Cone -->
    <path d="M0 -25 L45 10 C45 20, -45 20, -45 10 Z" fill="#FFE8A1" stroke="#E6C27A" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Horizontal Rings (Bamboo Strips) -->
    <path d="M-15 -10 Q0 -5 15 -10" fill="none" stroke="#E6C27A" stroke-width="1.5" />
    <path d="M-28 0 Q0 6 28 0" fill="none" stroke="#E6C27A" stroke-width="1.5" />
    <path d="M-40 10 Q0 18 40 10" fill="none" stroke="#E6C27A" stroke-width="1.5" />
    
    <!-- Chin strap (Quai nón) -->
    <path d="M-30 14 C-20 40, 20 40, 30 14" fill="none" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
